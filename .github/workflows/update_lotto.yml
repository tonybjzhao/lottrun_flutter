name: Update AU Lottery CSVs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write

concurrency:
  group: update-lotto-csvs
  cancel-in-progress: false

jobs:
  update-csv:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Update lottery CSVs
        run: python scrape_au_lottos.py

      - name: Commit updated CSVs
        run: |
          if [ -z "$(git status --porcelain -- docs/*.csv)" ]; then
            echo "No CSV changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/*.csv
          git commit -m "Update AU lottery CSVs"
          git push
